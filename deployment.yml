apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness-app
  namespace: dhaniga-ns  
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fitness
  template:
    metadata:
      labels:
        app: fitness
    spec:
      containers:
      - name: fitness-container
        image: muralisocial123/kyndrl-flower-app:v1.0.1
        ports:
        - containerPort: 3015